---
kind: pipeline
type: docker
name: ai-chatbot-whmcs

trigger:
  branch:
    - main
    - master

steps:
  - name: php-lint
    image: php:8.2-cli
    commands:
      - echo "Validating PHP files..."
      - find . -name "*.php" -exec php -l {} \; 2>&1 | head -20

  - name: complete
    image: alpine:3.18
    commands:
      - echo "AI Chatbot WHMCS - Build complete"
