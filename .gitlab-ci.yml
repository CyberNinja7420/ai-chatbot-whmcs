stages:
  - lint
  - complete

php-lint:
  stage: lint
  image: php:8.2-cli
  script:
    - echo "Validating PHP files..."
    - find . -name "*.php" -exec php -l {} \; 2>&1 | head -20
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"

complete:
  stage: complete
  image: alpine:3.18
  script:
    - echo "AI Chatbot WHMCS - Build complete"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
